<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Barcelona - Més que un club</title>
    <style>
        /* --- VARIÁVEIS DE CORES OFICIAIS --- */
        :root {
            --blaugrana-azul: #004d98;
            --blaugrana-grana: #a50044;
            --dourado-barca: #edbb00;
            --branco: #ffffff;
            --cinza-claro: #f4f4f4;
            --escuro: #111111;
        }

        /* --- ESTILOS GERAIS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--cinza-claro);
            color: var(--escuro);
            line-height: 1.6;
            padding-bottom: 80px; /* Evita que o footer tape o conteúdo */
        }

        /* --- HEADER / CABEÇALHO --- */
        header {
            background: linear-gradient(135deg, var(--blaugrana-azul) 50%, var(--blaugrana-grana) 50%);
            color: var(--branco);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid var(--dourado-barca);
        }

        header h1 {
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }
